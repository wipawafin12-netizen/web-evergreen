<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVERGREEN</title>
  <meta name="description"
    content="Evergreen Door Products - 50 Years of Architectural Products. Explore our collection of doors, flooring, and wall panels crafted for modern spaces." />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#fff7ed',
              100: '#ffedd5',
              500: '#f97316', // Orange-500
              600: '#ea580c', // Orange-600
              900: '#1a1a1a', // Soft Black
            }
          },
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Montserrat', 'sans-serif'],
          },
          animation: {
            'image-reveal': 'image-reveal 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'fade-in': 'fade-in 1s ease-out forwards',
          },
          keyframes: {
            'image-reveal': {
              '0%': { opacity: '0', filter: 'brightness(1.5) saturate(1.2)', transform: 'scale(1.05)' },
              '100%': { opacity: '1', filter: 'brightness(1) saturate(1)', transform: 'scale(1)' },
            },
            'fade-in': {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'fadeInUp': {
              '0%': { opacity: '0', transform: 'translateY(20px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            }
          }
        }
      }
    }
  </script>

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>

</head>
