server {
    listen 80;
    server_name www.chhindustry.com chhindustry.com;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ---- Security headers --------------------------------------------------
    # nginx add_header does NOT inherit into a location block that defines its
    # own add_header, so the security set is repeated where needed below.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # TLS is terminated at Traefik; clients only ever reach us over HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Proxy contact API calls to the internal Node backend.
    # "^~" stops nginx from then matching the regex image-cache location below,
    # which would otherwise hijack any proxied response whose path ends in an
    # image extension.
    location ^~ /api/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        proxy_pass http://chhindustry-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy PocketBase (content/admin API + uploaded files). The trailing slash
    # on proxy_pass strips the /pb/ prefix so PocketBase receives /api/..., /_/...
    # "^~" is essential: uploaded files are served at /pb/api/files/.../*.jpg,
    # and without it the regex image-cache location below would win (regex beats
    # a plain prefix) and try to serve them from disk -> 404 / broken images.
    location ^~ /pb/ {
        # Defining add_header here stops inheritance of the strict site CSP,
        # which would otherwise break PocketBase's own admin UI at /pb/_/.
        add_header X-Content-Type-Options "nosniff" always;
        client_max_body_size 12m;  # allow image uploads
        proxy_pass http://chhindustry-pb:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PocketBase realtime uses SSE — disable buffering for streaming.
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Cache static assets
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg)$ {
        add_header X-Content-Type-Options "nosniff" always;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
