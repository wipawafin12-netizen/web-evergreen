name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
            sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
              scp -o StrictHostKeyChecking=no \
                  -o ConnectTimeout=60 \
                  -r dist Dockerfile nginx.conf docker-compose.yml server pocketbase \
                  "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/srv/chhindustry-web/"

      - name: Rebuild Docker container
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            sudo apt-get install -y -qq sshpass
            sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
              ssh -o StrictHostKeyChecking=no \
                  -o ConnectTimeout=60 \
                  "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
                  'cd /srv/chhindustry-web && docker compose down && docker compose up -d --build && docker image prune -f'
